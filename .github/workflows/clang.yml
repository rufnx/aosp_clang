name: Update Clang Prebuilts

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      AOSP_REPO: "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/mirror-goog-main-llvm-toolchain-source"
      AOSP_ARCHIVE: "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/mirror-goog-main-llvm-toolchain-source"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Dependencies
        run: sudo apt-get update -qq && sudo apt-get install -qq aria2 jq

      - name: Fetch latest Clang info
        id: fetch-latest
        run: |
          set -euo pipefail

          LATEST_CLANG=$(curl -fsSL "$AOSP_REPO" \
            | grep -oP 'href="[^"]*clang-r[0-9]+[a-z]?/' \
            | grep -oP 'clang-r[0-9]+[a-z]?' \
            | sort -V \
            | tail -n1)

          [[ -z "$LATEST_CLANG" ]] && { echo "::error::Failed to get latest clang name"; exit 1; }

          BUILD_ID=$(curl -fsSL \
            "${AOSP_REPO}/${LATEST_CLANG}/BUILD_INFO?format=TEXT" \
            | base64 -d \
            | jq -r '.bid // empty')

          CLANG_VERSION=$(curl -fsSL \
            "${AOSP_REPO}/${LATEST_CLANG}/AndroidVersion.txt?format=TEXT" \
            | base64 -d \
            | head -n1)

          [[ -z "$BUILD_ID" ]] && { echo "::error::Failed to get BUILD_ID"; exit 1; }
          [[ -z "$CLANG_VERSION" ]] && { echo "::error::Failed to get CLANG_VERSION"; exit 1; }

          echo "latest_clang=$LATEST_CLANG" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "clang_version=$CLANG_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=${LATEST_CLANG}-${BUILD_ID}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: exists
        run: |
          TAG="${{ steps.fetch-latest.outputs.new_tag }}"
          if git tag --list "$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Latest Clang $TAG is already released, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New Clang $TAG detected, proceeding."
          fi

      - name: Download Clang
        if: steps.exists.outputs.exists == 'false'
        run: |
          set -euo pipefail

          WORKSPACE="toolchain"
          FILE="${{ steps.fetch-latest.outputs.latest_clang }}.tar.gz"
          URL="${AOSP_ARCHIVE}/${{ steps.fetch-latest.outputs.latest_clang }}.tar.gz?format=tar.gz"

          mkdir -p "$WORKSPACE"

          aria2c -c -x16 -s16 -k8M \
            --max-tries=5 \
            --retry-wait=5 \
            --file-allocation=falloc \
            --console-log-level=warn \
            -d "$WORKSPACE" \
            -o "$FILE" \
            "$URL"

          # Validate file
          [[ ! -s "$WORKSPACE/$FILE" ]] && { echo "::error::Downloaded file is empty"; exit 1; }
          echo "file_size=$(du -sh "$WORKSPACE/$FILE" | cut -f1)" >> "$GITHUB_ENV"

      - name: Create release
        if: steps.exists.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.fetch-latest.outputs.new_tag }}"
          FILE="toolchain/${{ steps.fetch-latest.outputs.latest_clang }}.tar.gz"
          CLANG_VERSION="${{ steps.fetch-latest.outputs.clang_version }}"
          BUILD_ID="${{ steps.fetch-latest.outputs.build_id }}"

          gh release create "$TAG" "$FILE" \
            --title "Clang prebuilts $TAG" \
            --notes "$(cat <<-EOF
          ### Google Clang Prebuilt
          | Field | Value |
          |---|---|
          | Clang Version | \`${CLANG_VERSION}\` |
          | Build ID | \`${BUILD_ID}\` |
          | Tag | \`${TAG}\` |

          > Automated release — updated every 3 hours
          EOF
          )"

      - name: Telegram Notify
        if: steps.exists.outputs.exists == 'false'
        env:
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          TAG_NAME="${{ steps.fetch-latest.outputs.latest_clang }}"
          FULL_TAG="${{ steps.fetch-latest.outputs.new_tag }}"
          CLANG_VERSION="${{ steps.fetch-latest.outputs.clang_version }}"
          ALT_VER="${TAG_NAME#clang-}"
          BID="${{ steps.fetch-latest.outputs.build_id }}"

          AOSP_TARBALL="${AOSP_ARCHIVE}/${TAG_NAME}.tar.gz?format=tar.gz"
          GITHUB_TARBALL="${REPO_URL}/releases/download/${FULL_TAG}/${TAG_NAME}.tar.gz"
          RELEASE_URL="${REPO_URL}/releases/tag/${FULL_TAG}"

          MESSAGE=$(cat <<-EOF
          *Google Clang Prebuilt Update*

          *Version*: \`${CLANG_VERSION}\` (\`${ALT_VER}\`)
          *Build ID*: \`${BID}\`
          *Size*: ${file_size:-unknown}

          *Links*:
          [GitHub Release](${RELEASE_URL}) | [AOSP tar\.gz](${AOSP_TARBALL})
          EOF
          )

          curl -fsSL -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d disable_web_page_preview=true \
            -d parse_mode=MarkdownV2 \
            --data-urlencode "text=${MESSAGE}"
